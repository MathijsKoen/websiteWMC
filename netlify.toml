[[plugins]]
package = "@netlify/plugin-nextjs"

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # X-Frame-Options weggelaten: Netlify visual editor heeft iframe-toegang nodig.
    # In plaats daarvan CSP frame-ancestors beperken tot Netlify domeinen:
    Content-Security-Policy = "frame-ancestors 'self' https://*.netlify.app https://app.netlify.com"
