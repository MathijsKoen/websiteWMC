<!DOCTYPE html>
<html lang="nl">
<head><meta charset="UTF-8"><title>Netlify Forms</title></head>
<body>
  <!--
    Dit bestand is uitsluitend bedoeld voor Netlify om formulieren te detecteren bij de build.
    Het is niet zichtbaar voor bezoekers.
  -->
  <form name="declaratie" data-netlify="true" hidden>
    <input name="naam" type="text" />
    <input name="email" type="email" />
    <input name="bedrag" type="text" />
    <input name="kostenplaats" type="text" />
    <textarea name="omschrijving"></textarea>
    <input name="rekeningnummer" type="text" />
  </form>
</body>
</html>
